<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aptics · Karadoc Pilot</title>
<!-- Generic engine. Renders from window.APTICS_SITE (sites/<id>.js). ?site=<id> default culcairn. Supports optional geometry.image raster backdrop.
     Zero external deps. 01 The opportunity · 02 Unit economics (AUD) · 03 Inspection & output · 04 The pilot. -->
<style>
  :root{
    --primary:#0f766e; --primary-soft:#0f766e1a; --accent:#c2410c;
    --bg:#fbfbfd; --panel:#ffffff; --panel2:#f5f5f7;
    --line:#e5e5ea; --hair:#ededf0; --terrain:#ece4d6;
    --text:#1d1d1f; --muted:#5f5f63; --faint:#86868b;
    --r:18px; --shadow:0 1px 2px rgba(0,0,0,.04),0 12px 32px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box} html,body{margin:0;height:100%} html{scroll-behavior:smooth}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em}
  a{color:var(--primary);text-decoration:none} a:hover{text-decoration:underline}
  .wrap{max-width:1040px;margin:0 auto;padding:0 24px} .hidden{display:none!important}
  h1,h2,h3{font-weight:600;letter-spacing:-0.022em;color:var(--text);margin:0}

  #backdrop{position:fixed;inset:-60px;z-index:0;pointer-events:none;overflow:hidden}
  #bg-svg{width:100%;height:100%;opacity:.4;transition:transform .3s ease-out;will-change:transform}

  #gate{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:#fbfbfd}
  .card-auth{width:min(400px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:34px;box-shadow:var(--shadow)}
  .brandmark{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.06em;font-size:17px;color:var(--text)}
  .dot{width:11px;height:11px;border-radius:50%;background:var(--primary)}
  .card-auth h1{font-size:22px;margin:20px 0 6px} .card-auth p.sub{color:var(--muted);font-size:14px;margin:0 0 20px}
  label.fld{display:block;font-size:12px;color:var(--faint);margin:14px 0 6px;font-weight:500}
  input.inp{width:100%;padding:13px 15px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);font-size:16px;outline:none}
  input.inp:focus{border-color:var(--primary);box-shadow:0 0 0 4px var(--primary-soft)}
  .btn{width:100%;margin-top:20px;padding:13px 15px;border:0;border-radius:12px;cursor:pointer;background:var(--primary);color:#fff;font-weight:600;font-size:16px}
  .btn.secondary{background:#fff;border:1px solid var(--line);color:var(--muted);margin-top:10px}
  .msg{font-size:13px;margin-top:12px;min-height:18px}.msg.err{color:#b91c1c}
  .demo-note{margin-top:16px;font-size:12px;color:var(--muted);background:var(--panel2);border-radius:12px;padding:11px 13px}
  .otp-in{letter-spacing:.4em;text-align:center;font-size:21px}

  header.top{position:sticky;top:0;z-index:20;background:rgba(251,251,253,.82);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--hair)}
  .top .wrap{display:flex;align-items:center;gap:14px;height:56px}
  .top .meta{margin-left:auto;text-align:right;font-size:12px;color:var(--faint)}
  .top .meta a{color:var(--primary);font-weight:500}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;background:var(--primary-soft);color:var(--primary)}
  .site-name{font-weight:600;font-size:14px} .logout{cursor:pointer;color:var(--faint);font-size:12px}
  @media(max-width:640px){
    .top .wrap{gap:10px;height:auto;min-height:52px;padding:8px 0;flex-wrap:wrap}
    .top .brandmark{font-size:15px} .site-name{font-size:13px}
    #h-customer{display:none} #h-updated{display:none}
    .top .meta{font-size:11px;line-height:1.4}
  }
  #app{position:relative;z-index:1}

  .hero-intro{padding:56px 0 8px}
  .hero-intro .eyebrow{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:14px}
  .hero-intro h1{font-size:46px;line-height:1.08;letter-spacing:-0.03em;max-width:840px}
  .hero-intro .lede{font-size:19px;line-height:1.5;color:var(--muted);max-width:720px;margin-top:16px;font-weight:400}
  .moneyband{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:28px}
  @media(max-width:760px){.moneyband{grid-template-columns:repeat(2,1fr)}}
  .mb{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
  .mb .v{font-size:26px;font-weight:600;letter-spacing:-0.02em} .mb.lead .v{color:var(--primary)}
  .mb .l{font-size:12px;color:var(--faint);margin-top:4px} .mb .u{font-size:11px;color:var(--faint)}
  @media(max-width:640px){.hero-intro h1{font-size:32px}.hero-intro .lede{font-size:17px}}

  .navbar{position:sticky;top:66px;z-index:15;display:flex;justify-content:center;margin:26px 0;pointer-events:none}
  .seg{display:inline-flex;gap:4px;background:rgba(245,245,247,.85);backdrop-filter:saturate(180%) blur(20px);border:1px solid var(--line);border-radius:999px;padding:5px;pointer-events:auto;box-shadow:var(--shadow);max-width:92vw;overflow-x:auto}
  .seg a{font-size:13px;color:var(--muted);padding:7px 15px;border-radius:999px;white-space:nowrap}
  .seg a.active{background:#fff;color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.06)}

  .module{margin:58px 0;scroll-margin-top:120px}
  .eyebrow{font-size:13px;font-weight:600;color:var(--primary);margin-bottom:10px}
  .module h2{font-size:31px;line-height:1.14;margin-bottom:12px}
  .lede{font-size:18px;line-height:1.55;color:var(--muted);max-width:780px;font-weight:400}

  .hero{position:relative;margin:22px 0 8px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--panel);box-shadow:var(--shadow)}
  .hero .titlebar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;padding:14px 18px;z-index:5;pointer-events:none}
  .hero h3{font-size:14px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4)} .hero .hint{margin-left:auto;font-size:11px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4)}
  #map{display:block;width:100%;height:60vh;min-height:440px;cursor:grab;touch-action:none;background:var(--terrain)}
  #map.grabbing{cursor:grabbing} #map circle,#map [data-kind]{cursor:pointer}
  .map-info{position:absolute;right:14px;top:54px;z-index:6;width:230px;background:rgba(255,255,255,.97);border:1px solid var(--line);border-radius:14px;padding:13px 15px;box-shadow:var(--shadow);font-size:13px}
  .map-info .mi-t{font-weight:600;font-size:14px;margin-bottom:3px} .map-info .mi-s{color:var(--faint);font-size:12px} .map-info p{margin:7px 0 0;color:var(--muted);font-size:12.5px}
  .layers{position:absolute;left:14px;bottom:14px;z-index:6;background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:12px;box-shadow:var(--shadow)}
  .layers b{display:block;margin-bottom:6px;font-size:11px;color:var(--faint);font-weight:600}
  .layers label{display:flex;align-items:center;gap:8px;margin:5px 0;cursor:pointer}
  .swatch{width:11px;height:11px;border-radius:3px;display:inline-block;flex:none}
  .circuits{margin-top:8px;padding-top:7px;border-top:1px solid var(--hair);display:flex;flex-wrap:wrap;gap:8px}
  .circuits span{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
  .zoomctl{position:absolute;right:14px;bottom:14px;z-index:6;display:flex;gap:6px}
  .zoomctl button{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:rgba(255,255,255,.94);color:var(--text);font-size:17px;cursor:pointer;box-shadow:var(--shadow)}

  .grid{display:grid;gap:14px;margin-top:18px}
  .g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}
  @media(max-width:860px){.g2,.g3{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
  .card h3{font-size:15px;margin-bottom:6px}.card p{margin:0;color:var(--muted);font-size:14px}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:9px 16px;font-size:14px}
  .kv dt{color:var(--faint)}.kv dd{margin:0;text-align:right;font-weight:500}
  .note{font-size:13px;color:var(--faint)}
  .callout{background:var(--primary-soft);border:1px solid #0f766e33;border-radius:var(--r);padding:24px}
  .callout h3{color:var(--primary)}
  .subhead{font-size:13px;font-weight:600;color:var(--faint);letter-spacing:.02em;margin:30px 0 4px}
  .big{font-size:17px;line-height:1.55;color:var(--text);max-width:800px}
  .legend{font-size:12px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}.legend span{display:flex;align-items:center;gap:6px}

  /* photo carousel (rover imagery — MC4 / thermal findings) */
  .carousel{position:relative;margin-top:14px;outline:none}
  .car-slide{display:none;margin:0}.car-slide.on{display:block}
  .car-frame{position:relative;border-radius:var(--r);overflow:hidden;background:#101012;border:1px solid var(--line);aspect-ratio:16/10;display:flex;align-items:center;justify-content:center}
  .car-frame img{width:100%;height:100%;object-fit:contain;display:block}
  .car-frame.car-missing img{display:none}
  .car-ph{display:none;color:#9a9aa0;font-size:13px;text-align:center;padding:20px}
  .car-ph span{font-size:11px;color:#6e6e73;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .car-frame.car-missing .car-ph{display:block}
  .car-tag{position:absolute;top:12px;left:12px;z-index:2;padding:4px 11px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(255,255,255,.92);color:var(--text);box-shadow:var(--shadow);pointer-events:none}
  .car-btn{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.92);font-size:20px;line-height:1;cursor:pointer;z-index:3;color:var(--text);box-shadow:var(--shadow)}
  .car-btn.prev{left:10px}.car-btn.next{right:10px}
  .car-dots{display:flex;gap:6px;justify-content:center;margin-top:10px}
  .car-dot{width:8px;height:8px;border-radius:50%;border:0;padding:0;background:var(--line);cursor:pointer}
  .car-dot.on{background:var(--primary)}
  .car-cap{font-size:13px;color:var(--muted);margin:10px 2px 0}
  @media print{.car-btn,.car-dots{display:none!important}}

  .econ{display:grid;grid-template-columns:1fr 1fr;gap:26px;align-items:center}
  @media(max-width:760px){.econ{grid-template-columns:1fr}}
  .srow{margin:0 0 18px}.srow .sl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px}.srow .sl b{font-weight:600}
  .srow input[type=range]{width:100%;accent-color:var(--primary);height:4px}
  .pill-row{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--hair)}
  .pill-row .pl{font-size:13px;color:var(--muted)} .pill-row .pv{font-size:18px;font-weight:600}
  .pill-total{background:var(--primary-soft);border-radius:14px;padding:18px 20px;text-align:center;margin-top:8px}
  .pill-total .l{font-size:13px;color:var(--primary);font-weight:600}
  .pill-total .v{font-size:40px;font-weight:600;letter-spacing:-0.03em;color:var(--primary);margin-top:4px}
  .pill-total .s{font-size:12px;color:var(--muted);margin-top:4px}

  .tl{margin-top:12px}
  .tl-item{position:relative;padding:0 0 22px 28px;border-left:2px solid var(--line);margin-left:6px}
  .tl-item:last-child{padding-bottom:0;border-left-color:transparent}
  .tl-dot{position:absolute;left:-7px;top:3px;width:12px;height:12px;border-radius:50%;background:var(--primary);border:2px solid #fff}
  .tl-when{font-size:12px;color:var(--primary);font-weight:600}
  .tl-phase{font-weight:600;font-size:15px;margin-top:1px}
  .tl-d{color:var(--muted);font-size:14px;margin-top:4px}

  .cta{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;background:var(--text);color:#fff;border-radius:var(--r);padding:26px 28px;margin-top:26px}
  .cta h3{color:#fff;font-size:19px} .cta p{color:#cfcfd2;font-size:14px;margin:6px 0 0;max-width:560px}
  .cta a.go{background:#fff;color:var(--text);font-weight:600;padding:12px 20px;border-radius:10px;white-space:nowrap}

  footer{color:var(--faint);font-size:12px;text-align:center;padding:46px 0 38px;border-top:1px solid var(--hair);margin-top:54px}
  footer a{color:var(--primary);font-weight:500}
  .reveal{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease}.reveal.in{opacity:1;transform:none}
  @media print{#backdrop,.navbar,.zoomctl,.layers,.map-info,header.top,.logout,.hint,.cta a.go{display:none!important}
    body{background:#fff}.module{margin:20px 0;page-break-inside:avoid}.card,.callout,.cta{box-shadow:none;break-inside:avoid}
    .hero-intro{padding:8px 0}.hero-intro h1{font-size:30px}#map{height:340px}.reveal{opacity:1;transform:none}a{color:var(--text)}}
</style>
</head>
<body>

<div id="backdrop"><svg id="bg-svg" preserveAspectRatio="xMidYMid slice"></svg></div>

<div id="gate">
  <div class="card-auth">
    <div class="brandmark"><span class="dot"></span><span id="g-logo">APTICS</span></div>
    <div id="step-email">
      <h1>Secure pilot access</h1>
      <p class="sub" id="g-sub">Enter your work email to receive a one-time access code.</p>
      <label class="fld" for="email">Work email</label>
      <input class="inp" id="email" type="email" placeholder="name@company.com" autocomplete="email" />
      <button class="btn" id="send-otp">Send access code</button>
      <div class="msg" id="email-msg"></div>
    </div>
    <div id="step-otp" class="hidden">
      <h1>Enter your code</h1>
      <p class="sub">We sent a 6-digit code to <b id="otp-email"></b>.</p>
      <label class="fld" for="otp">Access code</label>
      <input class="inp otp-in" id="otp" inputmode="numeric" maxlength="6" placeholder="------" />
      <button class="btn" id="verify-otp">Unlock dashboard</button>
      <button class="btn secondary" id="back-email">Use a different email</button>
      <div class="msg" id="otp-msg"></div>
      <div class="demo-note hidden" id="demo-note"></div>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <header class="top"><div class="wrap">
    <div class="brandmark"><span class="dot"></span><span id="h-logo">APTICS</span></div>
    <div><div class="site-name" id="h-site">—</div><div style="font-size:12px;color:var(--faint)" id="h-customer">—</div></div>
    <div class="meta"><span class="pill" id="h-status">—</span> · <a id="h-web" href="#" target="_blank">aptics.com</a><br/><span id="h-updated"></span><span class="logout" id="logout">Sign out</span></div>
  </div></header>
  <main class="wrap" id="content"></main>
  <footer><div id="f-note"></div><div style="margin-top:8px"><b>Aptics</b> · <a id="f-web" href="#" target="_blank">aptics.com</a> · <span id="f-tag"></span> · figures AUD &amp; indicative</div></footer>
</div>

<script>
(function loadSite(){
  var id=(new URLSearchParams(location.search).get("site")||"culcairn").replace(/[^a-z0-9_-]/gi,"");
  var s=document.createElement("script"); s.src="sites/"+id+".js";
  s.onload=function(){ window.APTICS_SITE?boot(window.APTICS_SITE):fail("Config loaded but APTICS_SITE not found."); };
  s.onerror=function(){ fail("Could not load site config: sites/"+id+".js"); };
  document.head.appendChild(s);
})();
function fail(m){var e=document.getElementById("email-msg");e.className="msg err";e.textContent=m;}

function boot(cfg){
  var r=document.documentElement.style;
  if(cfg.brand){r.setProperty("--primary",cfg.brand.primary||"#0f766e");r.setProperty("--accent",cfg.brand.accent||"#c2410c");}
  var logo=(cfg.brand&&cfg.brand.logoText)||"APTICS";
  document.title=logo+" · "+((cfg.meta&&cfg.meta.site)||"Pilot");
  document.getElementById("g-logo").textContent=logo; document.getElementById("h-logo").textContent=logo;
  document.getElementById("g-sub").textContent="Access restricted to "+(cfg.auth.allowedDomains||[]).map(function(d){return "@"+d;}).join(" / ")+".";
  drawBackdrop(cfg); wireGate(cfg);
  if(sessionStorage.getItem("aptics_unlocked_"+cfg.meta.siteId)==="1") unlock(cfg);
}
/* ── engagement tracking → POST /api/track (handled by worker.js, emailed to Aptics) ── */
window.__seenSections={};
function track(ev,data){try{
  var p=JSON.stringify({event:ev,email:sessionStorage.getItem("aptics_email")||"",site:(window.APTICS_SITE&&window.APTICS_SITE.meta&&window.APTICS_SITE.meta.siteId)||"",ts:new Date().toISOString(),data:data||{}});
  if(navigator.sendBeacon){navigator.sendBeacon("/api/track",new Blob([p],{type:"application/json"}));}
  else{fetch("/api/track",{method:"POST",headers:{"Content-Type":"application/json"},body:p,keepalive:true}).catch(function(){});}
}catch(e){}}
(function(){var t0=Date.now(),sent=false;
  window.addEventListener("pagehide",function(){
    if(sent||!sessionStorage.getItem("aptics_email"))return; sent=true;
    var names=[];Object.keys(window.__seenSections).forEach(function(id){var a=document.querySelector('.seg a[data-t="'+id+'"]');names.push(a?a.textContent:id);});
    track("visit_summary",{seconds:Math.round((Date.now()-t0)/1000),sections:names,slidersUsed:!!window.__slidersUsed,sow:!!window.__sowClicked});
  });
  window.addEventListener("pageshow",function(){sent=false;});
})();

function authMode(cfg){var a=cfg.auth||{};return a.otpRequestUrl?"otp":(a.accessKeys&&a.accessKeys.length?"key":(a.sharedKeyHash?"sharedkey":"shared"));}
function wireGate(cfg){
  var A=cfg.auth||{}, mode=authMode(cfg), keyUI=(mode==="key"||mode==="sharedkey");
  var emailIn=document.getElementById("email"),otpIn=document.getElementById("otp"),emailMsg=document.getElementById("email-msg"),otpMsg=document.getElementById("otp-msg");
  var sendBtn=document.getElementById("send-otp");
  if(keyUI){
    sendBtn.textContent="Continue";
    document.getElementById("g-sub").textContent="Enter your work email and the shared access key.";
  }
  sendBtn.onclick=function(){
    var email=(emailIn.value||"").trim().toLowerCase(), dom=email.split("@")[1];
    if(!dom||(A.allowedDomains||[]).indexOf(dom)<0){emailMsg.className="msg err";emailMsg.textContent="That email domain isn't authorised for this site.";return;}
    emailMsg.textContent=""; document.getElementById("otp-email").textContent=email;
    document.getElementById("step-email").classList.add("hidden"); document.getElementById("step-otp").classList.remove("hidden");
    if(keyUI){
      document.querySelector("#step-otp h1").textContent="Enter the access key";
      document.querySelector("#step-otp p.sub").innerHTML="Enter the shared access key for your organisation.";
      otpIn.setAttribute("maxlength","14"); otpIn.removeAttribute("inputmode");
      otpIn.setAttribute("placeholder","XXXX-XXXX-XXXX"); otpIn.classList.remove("otp-in"); otpIn.style.textTransform="uppercase";
      document.getElementById("verify-otp").textContent="Unlock dashboard";
    }
    otpIn.value=""; otpIn.focus(); requestOtp(cfg,email);
  };
  document.getElementById("back-email").onclick=function(){document.getElementById("step-otp").classList.add("hidden");document.getElementById("step-email").classList.remove("hidden");otpMsg.textContent="";};
  document.getElementById("verify-otp").onclick=async function(){
    var val=(otpIn.value||"").trim(), email=(emailIn.value||"").trim().toLowerCase(), ok=false;
    if(mode==="sharedkey"){
      ok=(await sha256((A.salt||"")+"|"+val.toUpperCase()))===A.sharedKeyHash;
    } else if(mode==="key"){
      var hh=await sha256((A.salt||"")+"|"+email+"|"+val.toUpperCase());
      ok=(A.accessKeys||[]).some(function(p){return p.hash===hh;});
    } else if(mode==="otp"){
      try{var r=await fetch(A.otpVerifyUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email,code:val})});
        var j=await r.json(); ok=!!(j&&j.ok);}catch(e){ok=false;}
    } else { ok=(await sha256(val))===A.otpHash; }
    if(ok){sessionStorage.setItem("aptics_unlocked_"+cfg.meta.siteId,"1");sessionStorage.setItem("aptics_email",email);track("login");unlock(cfg);}
    else{otpMsg.className="msg err";otpMsg.textContent=keyUI?"That access key isn't correct. Please check it and try again.":"Incorrect or expired code. Please try again.";}
  };
  otpIn.addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("verify-otp").click();});
  emailIn.addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("send-otp").click();});
}
async function requestOtp(cfg,email){
  var a=cfg.auth||{}, msg=document.getElementById("otp-msg");
  if(a.otpRequestUrl){  // real emailed code via serverless emailer (see serverless/otp-worker.js)
    try{var r=await fetch(a.otpRequestUrl,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email})}); if(!r.ok) throw 0;}
    catch(e){msg.className="msg err";msg.textContent="Couldn't send the code just now — please try again in a moment.";}
    return;
  }

function wireCarousel(id){
  var c=document.getElementById(id); if(!c) return;
  var slides=c.querySelectorAll(".car-slide"), dots=c.querySelectorAll(".car-dot"), i=0;
  function show(n){i=(n+slides.length)%slides.length;
    slides.forEach(function(s,j){s.classList.toggle("on",j===i);});
    dots.forEach(function(d,j){d.classList.toggle("on",j===i);});}
  var p=c.querySelector(".car-btn.prev"), nx=c.querySelector(".car-btn.next");
  if(p)p.onclick=function(){show(i-1);}; if(nx)nx.onclick=function(){show(i+1);};

  var ig='<g data-layer="inv">';
  (g.inverters||[]).forEach(function(v){var col=circuitColor(cfg,v.circuit);
    ig+='<circle cx="'+v.x+'" cy="'+v.y+'" r="6" fill="'+col+'" stroke="#fff" stroke-width="1.4" data-kind="inv" data-id="'+v.id+'" data-circuit="'+v.circuit+'"/>';});
  ig+='</g>'; s+=ig;
  (g.markers||[]).forEach(function(mk){s+='<g pointer-events="none"><rect x="'+(mk.x-5)+'" y="'+(mk.y-5)+'" width="10" height="10" fill="#5b5b60" rx="2"/><text x="'+(mk.x+11)+'" y="'+(mk.y+4)+'" font-size="11" font-weight="600" fill="#3f3f44">'+esc(mk.label)+'</text></g>';});
  (g.neighbours||[]).forEach(function(nb){s+='<text x="'+nb.x+'" y="'+nb.y+'" font-size="11" font-style="italic" fill="#8a8170" text-anchor="middle" pointer-events="none">'+esc(nb.label)+'</text>';});
  if(g.scaleBarMetres&&g.metresPerUnit){var len=g.scaleBarMetres/g.metresPerUnit, x0=100, y0=g.viewBox[3]-40;
    s+='<g pointer-events="none"><line x1="'+x0+'" y1="'+y0+'" x2="'+(x0+len).toFixed(1)+'" y2="'+y0+'" stroke="#3f3f44" stroke-width="2"/><line x1="'+x0+'" y1="'+(y0-5)+'" x2="'+x0+'" y2="'+(y0+5)+'" stroke="#3f3f44" stroke-width="2"/><line x1="'+(x0+len).toFixed(1)+'" y1="'+(y0-5)+'" x2="'+(x0+len).toFixed(1)+'" y2="'+(y0+5)+'" stroke="#3f3f44" stroke-width="2"/><text x="'+(x0+len/2).toFixed(1)+'" y="'+(y0-9)+'" font-size="12" font-weight="600" fill="#3f3f44" text-anchor="middle">'+g.scaleBarMetres+' m</text></g>';}
  var nx=g.viewBox[2]-70, ny=70;
  s+='<g pointer-events="none"><line x1="'+nx+'" y1="'+(ny+26)+'" x2="'+nx+'" y2="'+ny+'" stroke="#3f3f44" stroke-width="2"/><path d="M'+nx+' '+(ny-2)+' l-5 9 l5 -3 l5 3 z" fill="#3f3f44"/><text x="'+nx+'" y="'+(ny+40)+'" font-size="11" font-weight="700" fill="#3f3f44" text-anchor="middle">N</text><text x="'+nx+'" y="'+(ny+52)+'" font-size="8" fill="#8a8170" text-anchor="middle">'+esc(g.northLabel||"")+'</text></g>';
  svg.innerHTML=s; applyVB(); function applyVB(){svg.setAttribute("viewBox",vb.join(" "));}

  var info=document.getElementById("map-info");
  function setInfo(t,sub,body){info.innerHTML='<div class="mi-t">'+t+'</div>'+(sub?'<div class="mi-s">'+sub+'</div>':'')+(body?'<p>'+body+'</p>':'');}
  function defInfo(){setInfo(esc(cfg.meta.site),esc(cfg.meta.capacity),"Click the trial area, an inverter or a marker for detail.");}
  defInfo();
  function inspect(t){var k=t.getAttribute("data-kind");
    if(k==="inv"){var id=t.getAttribute("data-id"),cir=t.getAttribute("data-circuit");setInfo(esc(id),"MV circuit "+esc(cir),"One of "+nI+" inverter stations (~"+(mwac/nI).toFixed(1)+" MWac each).");}
    else if(k==="trial"){var TR=g.pilotRegion||L.pilotRegion;setInfo(esc(TR.label),(TR.areaHa?TR.areaHa+" ha":"")+(TR.mw?" · ~"+TR.mw+" MW":""),esc(TR.note));}}
  var drag=null,moved=false;
  svg.addEventListener("pointerdown",function(e){drag={x:e.clientX,y:e.clientY,vx:vb[0],vy:vb[1]};moved=false;svg.classList.add("grabbing");svg.setPointerCapture(e.pointerId);});
  svg.addEventListener("pointermove",function(e){if(!drag)return;if(Math.abs(e.clientX-drag.x)+Math.abs(e.clientY-drag.y)>4)moved=true;var r=svg.getBoundingClientRect();vb[0]=drag.vx-(e.clientX-drag.x)*(vb[2]/r.width);vb[1]=drag.vy-(e.clientY-drag.y)*(vb[3]/r.height);applyVB();});
  function end(){drag=null;svg.classList.remove("grabbing");}
  svg.addEventListener("pointerup",end); svg.addEventListener("pointerleave",end);
  svg.addEventListener("click",function(e){if(moved)return;var t=e.target.closest("[data-kind]");if(t)inspect(t);else defInfo();});
  svg.addEventListener("wheel",function(e){e.preventDefault();var r=svg.getBoundingClientRect();var mx=vb[0]+(e.clientX-r.left)/r.width*vb[2], my=vb[1]+(e.clientY-r.top)/r.height*vb[3];zoomAt(mx,my,e.deltaY<0?0.88:1.14);},{passive:false});
  function zoomAt(cx,cy,fz){var ar=cfg.geometry.viewBox[3]/cfg.geometry.viewBox[2];var nw=Math.max(160,Math.min(3600,vb[2]*fz)),nh=nw*ar;vb[0]=cx-(cx-vb[0])*(nw/vb[2]);vb[1]=cy-(cy-vb[1])*(nh/vb[3]);vb[2]=nw;vb[3]=nh;applyVB();}
  var c0=cfg.geometry.viewBox;
  document.getElementById("zin").onclick=function(){zoomAt(vb[0]+vb[2]/2,vb[1]+vb[3]/2,0.8);};
  document.getElementById("zout").onclick=function(){zoomAt(vb[0]+vb[2]/2,vb[1]+vb[3]/2,1.25);};
  document.getElementById("zreset").onclick=function(){vb=c0.slice();applyVB();};
  var box=document.getElementById("layers");
  if(PR){var labt=document.createElement("label");labt.innerHTML='<input type="checkbox" checked data-l="trial"><span class="swatch" style="background:#eab308"></span>Trial area';box.appendChild(labt);}
  if((g.inverters||[]).length){var lab=document.createElement("label");lab.innerHTML='<input type="checkbox" checked data-l="inv"><span class="swatch" style="background:#2563eb"></span>Inverter stations';box.appendChild(lab);}
  var circuits=cfg.geometry.circuits||{};
  if(Object.keys(circuits).length){var cd=document.createElement("div");cd.className="circuits";Object.keys(circuits).forEach(function(k){cd.innerHTML+='<span><span class="swatch" style="background:'+circuits[k]+'"></span>'+k+'</span>';});box.appendChild(cd);}
  box.addEventListener("change",function(e){var key=e.target.getAttribute("data-l");if(!key)return;document.querySelectorAll('#map g[data-layer="'+key+'"]').forEach(function(gg){gg.style.display=e.target.checked?"":"none";});});
}
</script>
<!-- engine v3 · carousel + thermal findings + generation slider · multi-block map · configurable labour slider range (economics.labourRange) -->
</body>
</html>
